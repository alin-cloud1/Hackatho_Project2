# Render Blueprint — deploys the Node/Express backend as a free web service.
# In the Render dashboard: New + → Blueprint → connect this repo. Render reads
# this file automatically. After it deploys, set the "sync: false" secrets
# (DATABASE_URL, GROQ_API_KEY, CORS_ORIGIN) in the service's Environment tab.
#
# The Postgres schema is NOT created/seeded here on boot — schema.sql drops
# and recreates every table, so running it on each deploy would wipe live
# data. Run `npm run db:setup && npm run db:seed` once from your machine
# against the same DATABASE_URL (as already done), and again by hand only
# when the schema actually changes.
services:
  - type: web
    name: anti-kuddus-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: SEED_EMBEDDINGS
        value: "false"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: DATABASE_URL
        sync: false # paste your Postgres connection string in the dashboard (kept out of git)
      - key: GROQ_API_KEY
        sync: false # paste your Groq key in the dashboard (kept out of git)
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://anti-kuddus.vercel.app
