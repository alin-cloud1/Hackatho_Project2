# Render Blueprint — deploys the Node/Express backend as a free web service.
# In the Render dashboard: New + → Blueprint → connect this repo. Render reads
# this file automatically. After it deploys, set the three "sync: false" secrets
# (MONGODB_URI, GROQ_API_KEY, CORS_ORIGIN) in the service's Environment tab.
#
# MONGODB_URI: Render has no local MongoDB, so point this at a free MongoDB
# Atlas cluster (https://www.mongodb.com/cloud/atlas). Create a free M0 cluster,
# add a database user, allow access from anywhere (0.0.0.0/0), then paste the
# connection string, e.g.
#   mongodb+srv://<user>:<pass>@cluster0.xxxxx.mongodb.net/?retryWrites=true&w=majority
# On first boot the backend auto-seeds the roster, rulebook, and curriculum.
services:
  - type: web
    name: anti-kuddus-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: SEED_EMBEDDINGS
        value: "false"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MONGODB_DB
        value: anti_kuddus
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: MONGODB_URI
        sync: false # paste your MongoDB Atlas connection string (kept out of git)
      - key: GROQ_API_KEY
        sync: false # paste your Groq key in the dashboard (kept out of git)
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://anti-kuddus.vercel.app
