# Render Blueprint — deploys the Node/Express backend as a free web service.
# In the Render dashboard: New + → Blueprint → connect this repo. Render reads
# this file automatically. After it deploys, set the two "sync: false" secrets
# (GROQ_API_KEY and CORS_ORIGIN) in the service's Environment tab.
services:
  - type: web
    name: anti-kuddus-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    # Seed the SQLite DB on first boot (ephemeral fs), then start the API server.
    startCommand: sh -c "if [ ! -f data/anti_kuddus.db ]; then node scripts/setup-db.js && node scripts/seed-db.js; fi; node src/index.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: SEED_EMBEDDINGS
        value: "false"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: GROQ_API_KEY
        sync: false # paste your Groq key in the dashboard (kept out of git)
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://anti-kuddus.vercel.app
